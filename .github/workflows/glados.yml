name: Top1 Node (5x Ping) + Zero-Downtime Update

on:
  schedule:
    - cron: '0 */3 * * *'  # 每3小时执行一次
  workflow_dispatch: {}    # 支持手动触发

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq dnsutils

      - name: Define Environment
        run: |
          # 待检测的三个节点
          NODES="emos.dirige.de5.net clun.top emby.67982.eu.cc v4.iemby.cn cdn.zhezhi.art" 
          echo "NODES=$NODES" >> $GITHUB_ENV
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> $GITHUB_ENV
          echo "CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}" >> $GITHUB_ENV

      - name: Latency Ping (5 Times) and Resolve
        run: |
          RESULTS=""
          for NODE in $NODES; do
            echo "正在对节点进行 5 次测速: $NODE ..."
            
            MIN_TIME=9.999
            # 内部循环 5 次，取最小值
            for i in {1..5}; do
              # 获取总响应时间
              TIME=$(curl -o /dev/null -s -L -m 5 -w "%{time_total}" "https://$NODE" || echo "9.999")
              echo "  第 $i 次测试延迟: ${TIME}s"
              
              # 比较并保留最小值
              if (( $(echo "$TIME < $MIN_TIME" | bc -l) )); then
                MIN_TIME=$TIME
              fi
            done
            
            # 解析 IP
            IP=$(dig +short "$NODE" | grep -E '^[0-9.]+$' | head -n1)
            
            if [[ ! -z "$IP" && "$MIN_TIME" != "9.999" ]]; then
              RESULTS="${RESULTS}${MIN_TIME} ${IP}"$'\n'
              echo "节点 $NODE 最终取最小值: ${MIN_TIME}s | IP: $IP"
            fi
          done

          # 按照 5 次测试中的最小值进行全国/全球排序，取最快的一个
          BEST_IP=$(echo "$RESULTS" | sed '/^$/d' | sort -n | head -n1 | awk '{print $2}')

          if [ -z "$BEST_IP" ]; then
            echo "错误：未找到任何可用节点，停止更新。"
            exit 1
          fi

          echo "BEST_IP=$BEST_IP" >> $GITHUB_ENV
          echo "选定的最优 IP (5次测试中延迟最低): $BEST_IP"

      - name: Update Cloudflare DNS
        run: |
          # 1. 获取现有记录 ID
          EXISTING_RECORDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$CF_RECORD_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          RECORD_IDS=$(echo "$EXISTING_RECORDS" | jq -r '.result[].id')

          # 2. 先添加最新的最优 IP 记录（零停机切换）
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
          echo "已成功添加新 A 记录: $BEST_IP"

          # 3. 删除旧记录
          if [[ ! -z "$RECORD_IDS" && "$RECORD_IDS" != "null" ]]; then
            for ID in $RECORD_IDS; do
              # 增加判断，防止误删刚添加的记录（基于 ID 排除）
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$ID" \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json"
              echo "已清理旧记录 ID: $ID"
            done
          fi
          echo "更新成功！"
