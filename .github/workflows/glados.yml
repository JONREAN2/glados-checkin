name: Top1 Node (CF IP Tracker + Full TG Report)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq dnsutils bc

      - name: Define Environment
        run: |
          # 包含你的核心优选域名
          BASE_NODES="emos.dirige.de5.net clun.top emby.67982.eu.cc v4.iemby.cn pro.111196123.xyz cf.cloudflare.22336666.xyz 172.64.52.124"
          echo "NODES=$BASE_NODES" >> $GITHUB_ENV
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> $GITHUB_ENV
          echo "CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}" >> $GITHUB_ENV
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TG_CHAT_ID=${{ secrets.TG_CHAT_ID }}" >> $GITHUB_ENV

      - name: Latency Test & Ranking
        run: |
          RESULTS=""
          for NODE in $NODES; do
            echo "------------------------------------------------"
            CLEAN_TARGET=$(echo "$NODE" | sed 's/\*\.//g')
            
            # 第一步：实时解析域名当前的 IP (如 104.18.145.43)
            if [[ "$CLEAN_TARGET" =~ ^[0-9.]+$ ]]; then
              IP=$CLEAN_TARGET
            else
              # 增加重试逻辑，确保拿到解析结果
              IP=$(dig +short "$CLEAN_TARGET" | grep -E '^[0-9.]+$' | head -n1)
            fi

            if [[ -z "$IP" ]]; then
              echo "❌ 域名 $CLEAN_TARGET 解析失败，跳过"
              continue
            fi
            
            echo "测速目标: $CLEAN_TARGET -> 实际 IP: $IP"
            
            node_best="9.999"
            for i in {1..5}; do
              # 对解析出的具体 IP 进行 HTTPS 握手测速
              TIME_RAW=$(curl -o /dev/null -s -L -k --connect-timeout 2 -m 3 \
                -w "%{time_total}\n" \
                "https://$IP" -H "Host: $CLEAN_TARGET" || echo "9.999")
              
              TIME=$(echo "$TIME_RAW" | grep -oE '[0-9.]+' | head -n1)
              [[ -z "$TIME" ]] && TIME="9.999"
              
              echo "  测试 $i: ${TIME}s"
              is_better=$(awk -v t1="$TIME" -v t2="$node_best" 'BEGIN {print (t1 <= t2)}')
              if [ "$is_better" -eq 1 ]; then node_best=$TIME; fi
            done
            
            if [[ "$node_best" != "9.999" ]]; then
              RESULTS="${RESULTS}${node_best} ${IP} ${NODE}"$'\n'
            fi
          done

          echo "---- 排序结果 ----"
          SORTED_LIST=$(echo "$RESULTS" | sed '/^$/d' | sort -n)
          echo "$SORTED_LIST"
          
          BEST_IP=$(echo "$SORTED_LIST" | head -n1 | awk '{print $2}')
          
          if [ -z "$BEST_IP" ]; then
            echo "❌ 无有效节点"
            exit 1
          fi

          # 格式化 Top 4 报告
          TOP_REPORT=$(echo "$SORTED_LIST" | head -n 4 | awk '{printf "No.%d: %s (%ss)\n   └ 来自: %s\n", NR, $2, $1, $3}')

          echo "BEST_IP=$BEST_IP" >> $GITHUB_ENV
          echo "TOP_REPORT<<EOF" >> $GITHUB_ENV
          echo "$TOP_REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update Cloudflare DNS & Notify
        run: |
          EXIST_DATA=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$CF_RECORD_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          RECORD_IDS=$(echo "$EXIST_DATA" | jq -r '.result[]?.id // empty')
          FIRST_ID=$(echo "$RECORD_IDS" | head -n1)

          if [[ ! -z "$FIRST_ID" && "$FIRST_ID" != "null" ]]; then
            UPDATE_RES=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$FIRST_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          else
            UPDATE_RES=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          fi

          if echo "$UPDATE_RES" | jq -e '.success' > /dev/null; then
            echo "✅ 更新成功: $BEST_IP"
            for ID in $RECORD_IDS; do
              [[ "$ID" != "$FIRST_ID" ]] && curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$ID" -H "Authorization: Bearer $CF_API_TOKEN"
            done
            
            MSG=$(printf "🚀 Emby 优选完成\n-----------------------\n🏆 冠军 IP: %s\n\n📊 实测排位表:\n%s\n\n⏰ 时间: %s" \
                  "$BEST_IP" "$TOP_REPORT" "$(date '+%Y-%m-%d %H:%M:%S')")

            curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TG_CHAT_ID" \
              --data-urlencode "text=$MSG"
          else
            ERR=$(echo $UPDATE_RES | jq -c '.errors')
            curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TG_CHAT_ID" \
              --data-urlencode "text=❌ DNS更新失败: $ERR"
            exit 1
          fi
