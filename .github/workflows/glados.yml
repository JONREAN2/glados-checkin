name: Top1 Node (Fixed IPv4 Validation)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq dnsutils bc

      - name: Define Environment
        run: |
          # 修正点：通配符域名如果无法直接解析，建议换成具体子域名，或者脚本会自动跳过无法解析的项
          BASE_NODES="emos.dirige.de5.net clun.top emby.67982.eu.cc v4.iemby.cn pro.111196123.xyz 172.64.52.124"
          
          echo "NODES=$BASE_NODES" >> $GITHUB_ENV
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> $GITHUB_ENV
          echo "CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}" >> $GITHUB_ENV
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TG_CHAT_ID=${{ secrets.TG_CHAT_ID }}" >> $GITHUB_ENV

      - name: TTFB Parallel Test + Jitter Filter
        run: |
          test_node () {
            NODE=$1
            # 过滤掉通配符星号，防止 dig 报错
            CLEAN_NODE=$(echo "$NODE" | sed 's/\*\.//g')
            echo "正在测速: $CLEAN_NODE" >&2

            # 解析 IP 并严格校验是否为合法的 IPv4
            if [[ "$CLEAN_NODE" =~ ^[0-9.]+$ ]]; then
              IP=$CLEAN_NODE
            else
              IP=$(dig +short "$CLEAN_NODE" | grep -E '^[0-9.]+$' | head -n1)
            fi

            # 如果解析不到有效 IP，直接退出
            if [[ -z "$IP" ]]; then
              echo "❌ 无法解析 IP: $CLEAN_NODE" >&2
              return
            fi

            TIMES=""
            FAIL=0
            for i in {1..5}; do
              T=$(curl -o /dev/null -s -L -k -m 3 -w "%{time_starttransfer}\n" "https://$CLEAN_NODE" || echo "9.999")
              T=$(echo "$T" | grep -oE '[0-9.]+' | head -n1)
              [[ -z "$T" ]] && T="9.999"
              echo "  $CLEAN_NODE 第$i次: ${T}s" >&2
              TIMES="$TIMES $T"
              cmp=$(awk -v t="$T" 'BEGIN{print (t>1.5)}')
              [[ $cmp -eq 1 ]] && FAIL=$((FAIL+1))
            done

            if [[ $FAIL -ge 2 ]]; then return; fi

            MIN=$(echo $TIMES | tr ' ' '\n' | sort -n | head -n1)
            MAX=$(echo $TIMES | tr ' ' '\n' | sort -n | tail -n1)
            JITTER=$(awk -v max="$MAX" -v min="$MIN" 'BEGIN{print max-min}')

            bad=$(awk -v j="$JITTER" 'BEGIN{print (j>0.8)}')
            [[ $bad -eq 1 ]] && return

            # 最终输出格式：延迟 IP
            echo "$MIN $IP"
          }

          export -f test_node
          RESULTS=$(printf "%s\n" $NODES | xargs -n 1 -I {} -P 5 bash -c 'test_node "{}"')

          echo "---- 实测汇总结果 ----"
          echo "$RESULTS"

          # 排序并提取，增加一层过滤确保 BEST_IP 必须符合 IPv4 格式
          SORTED=$(echo "$RESULTS" | sed '/^$/d' | sort -n)
          BEST_IP=$(echo "$SORTED" | grep -E '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | awk '{print $2}')

          if [ -z "$BEST_IP" ]; then
            echo "❌ 没有任何合法 IP 通过测试"
            exit 1
          fi

          echo "BEST_IP=$BEST_IP" >> $GITHUB_ENV
          echo "🏆 冠军 IP: $BEST_IP"

      - name: Update Cloudflare DNS
        run: |
          # 增加最后一道防线：检查 BEST_IP 是否为空
          if [[ -z "$BEST_IP" ]]; then
            echo "错误：BEST_IP 为空，取消 Cloudflare 更新"
            exit 1
          fi

          EXIST_DATA=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$CF_RECORD_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          RECORD_IDS=$(echo "$EXIST_DATA" | jq -r '.result[]?.id // empty')
          FIRST_ID=$(echo "$RECORD_IDS" | head -n1)

          if [[ ! -z "$FIRST_ID" && "$FIRST_ID" != "null" ]]; then
            UPDATE_RES=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$FIRST_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          else
            UPDATE_RES=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          fi

          if echo "$UPDATE_RES" | jq -e '.success' > /dev/null; then
            echo "✅ 更新成功: $BEST_IP"
            # 清理冗余
            for ID in $RECORD_IDS; do
              [[ "$ID" != "$FIRST_ID" ]] && curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$ID" -H "Authorization: Bearer $CF_API_TOKEN"
            done

            MSG="🏆 Emby优选成功
            IP: $BEST_IP
            时间: $(date '+%Y-%m-%d %H:%M:%S')"
            curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" -d chat_id="$TG_CHAT_ID" -d text="$MSG"
          else
            ERR=$(echo $UPDATE_RES | jq -c '.errors')
            echo "❌ 失败: $ERR"
            curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" -d chat_id="$TG_CHAT_ID" -d text="❌ DNS失败: $ERR"
            exit 1
          fi
