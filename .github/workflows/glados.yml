name: Top1 Node (TTFB + Jitter Filter + Parallel)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'жүӢеҠЁиҝҗиЎҢпјҲйҡҸдҫҝеЎ«пјү'
        required: false
        default: 'yes'

jobs:
  update-dns:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq dnsutils bc

      - name: Define Environment
        run: |
          BASE_NODES="emos.dirige.de5.net clun.top emby.67982.eu.cc v4.iemby.cn pro.111196123.xyz *.cloudflare.22336666.xyz 172.64.52.124"
          echo "NODES=$BASE_NODES" >> $GITHUB_ENV
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> $GITHUB_ENV
          echo "CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}" >> $GITHUB_ENV
          echo "TG_BOT_TOKEN=${{ secrets.TG_BOT_TOKEN }}" >> $GITHUB_ENV
          echo "TG_CHAT_ID=${{ secrets.TG_CHAT_ID }}" >> $GITHUB_ENV

      - name: TTFB Parallel Test + Jitter Filter
        run: |
          test_node () {
            NODE=$1
            echo "жөӢйҖҹ: $NODE"

            TIMES=""
            FAIL=0

            for i in {1..5}; do
              T=$(curl -o /dev/null -s -L -k -m 3 \
                -w "%{time_starttransfer}\n" \
                "https://$NODE" || echo "9.999")

              T=$(echo "$T" | grep -oE '[0-9.]+' | head -n1)
              [[ -z "$T" ]] && T="9.999"

              echo "  з¬¬$iж¬Ў: $T"
              TIMES="$TIMES $T"

              cmp=$(awk -v t="$T" 'BEGIN{print (t>1.0)}')
              [[ $cmp -eq 1 ]] && FAIL=$((FAIL+1))
            done

            if [[ $FAIL -ge 2 ]]; then
              echo "вқҢ дёҚзЁіе®ҡдёўејғ: $NODE"
              return
            fi

            MIN=$(echo $TIMES | tr ' ' '\n' | sort -n | head -n1)
            MAX=$(echo $TIMES | tr ' ' '\n' | sort -n | tail -n1)
            BEST=$MIN
            JITTER=$(awk -v max="$MAX" -v min="$MIN" 'BEGIN{print max-min}')

            bad=$(awk -v j="$JITTER" 'BEGIN{print (j>0.5)}')
            [[ $bad -eq 1 ]] && echo "вҡ пёҸ й«ҳжҠ–еҠЁ: $NODE ($JITTER)"

            if [[ "$NODE" =~ ^[0-9.]+$ ]]; then
              IP=$NODE
            else
              IP=$(dig +short "$NODE" | grep -E '^[0-9.]+$' | head -n1)
            fi

            [[ -z "$IP" ]] && return

            echo "$BEST $IP"
          }

          export -f test_node

          RESULTS=$(printf "%s\n" $NODES | xargs -I {} -P 5 bash -c 'test_node "$@"' _ {})

          echo "----з»“жһң----"
          echo "$RESULTS"

          SORTED=$(echo "$RESULTS" | sed '/^$/d' | sort -n)
          BEST_IP=$(echo "$SORTED" | head -n1 | awk '{print $2}')

          if [ -z "$BEST_IP" ]; then
            echo "вқҢ жІЎжңүеҸҜз”ЁиҠӮзӮ№"
            exit 1
          fi

          echo "BEST_IP=$BEST_IP" >> $GITHUB_ENV
          echo "рҹҸҶ жңҖдјҳIP: $BEST_IP"

      - name: Update Cloudflare DNS
        run: |
          EXIST_DATA=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$CF_RECORD_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          RECORD_IDS=$(echo "$EXIST_DATA" | jq -r '.result[]?.id // empty')
          FIRST_ID=$(echo "$RECORD_IDS" | head -n1)

          if [[ ! -z "$FIRST_ID" ]]; then
            UPDATE_RES=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$FIRST_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          else
            UPDATE_RES=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          fi

          if echo "$UPDATE_RES" | jq -e '.success' > /dev/null; then
            echo "вң… жӣҙж–°жҲҗеҠҹ"

            MSG="рҹҸҶ EmbyдјҳйҖүиҠӮзӮ№
            IP: $BEST_IP
            ж—¶й—ҙ: $(date '+%F %T')"

            curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="$MSG"
          else
            ERR=$(echo $UPDATE_RES | jq -c '.errors')
            echo "вқҢ еӨұиҙҘ: $ERR"

            curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT_ID" \
              -d text="вқҢ DNSеӨұиҙҘ: $ERR"

            exit 1
          fi
