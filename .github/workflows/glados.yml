name: Top1 Node (API Speed Rank + 5x Ping Mix)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq dnsutils bc

      - name: Define Environment & Extract API (By Speed)
        run: |
          # 1. 基础固定节点列表
          BASE_NODES="emos.dirige.de5.net clun.top emby.67982.eu.cc v4.iemby.cn pro.111196123.xyz 172.64.52.124"
          
          # 2. 从 API 获取数据并按 speed 从大到小提取前二
          echo "正在从 API 获取情报节点 (按 Speed 排名)..."
          API_RES=$(curl -s -m 10 "https://ip.v2too.top/api/nodes")
          
          # 修正提取逻辑：
          # .data | map(select(.speed != null)) 确保 speed 有值
          # sort_by(.speed | tonumber) | reverse 按 speed 数值从大到小排列
          DYNAMIC_IPS=$(echo "$API_RES" | jq -r '.data | map(select(.speed != null)) | sort_by(.speed | tonumber) | reverse | .[:2] | .[].ip' | xargs)
          
          if [ -z "$DYNAMIC_IPS" ] || [ "$DYNAMIC_IPS" == "null" ]; then
             echo "API 提取失败，检查返回格式..."
             DYNAMIC_IPS=""
          fi
          
          echo "API 速度排名前二的 IP: $DYNAMIC_IPS"
          
          # 3. 合并所有目标
          ALL_NODES="$BASE_NODES $DYNAMIC_IPS"
          echo "NODES=$ALL_NODES" >> $GITHUB_ENV
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> $GITHUB_ENV
          echo "CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}" >> $GITHUB_ENV

      - name: Latency Ping (5 Times) and Resolve
        run: |
          RESULTS=""
          for NODE in $NODES; do
            echo "------------------------------------------------"
            echo "正在对目标进行实地测速: $NODE ..."
            node_best="9.999"
            for i in {1..5}; do
              TIME_RAW=$(curl -o /dev/null -s -L -k -m 3 -w "%{time_total}\n" "https://$NODE" || echo "9.999")
              TIME=$(echo "$TIME_RAW" | grep -oE '[0-9.]+' | head -n1)
              [[ -z "$TIME" ]] && TIME="9.999"
              echo "  测试 $i: ${TIME}s"
              # 使用 awk 比较，保留该节点 5 次里延迟最低的一次
              is_better=$(awk -v t1="$TIME" -v t2="$node_best" 'BEGIN {print (t1 < t2)}')
              if [ "$is_better" -eq 1 ]; then node_best=$TIME; fi
            done
            
            # 识别 IP
            if [[ "$NODE" =~ ^[0-9.]+$ ]]; then
              IP=$NODE
            else
              IP=$(dig +short "$NODE" | grep -E '^[0-9.]+$' | head -n1)
            fi
            
            if [[ ! -z "$IP" && "$node_best" != "9.999" ]]; then
              RESULTS="${RESULTS}${node_best} ${IP}"$'\n'
              echo ">> 实测最优: ${node_best}s | IP: $IP"
            fi
          done

          echo "------------------------------------------------"
          echo "--- 最终实测延迟排序 ---"
          SORTED_LIST=$(echo "$RESULTS" | sed '/^$/d' | sort -n)
          echo "$SORTED_LIST"
          
          # 选出实地测试中延迟最低的冠军
          BEST_IP=$(echo "$SORTED_LIST" | head -n1 | awk '{print $2}')

          if [ -z "$BEST_IP" ]; then
            echo "错误：未找到可用节点。"
            exit 1
          fi

          echo "BEST_IP=$BEST_IP" >> $GITHUB_ENV
          echo "🏆 最终更新 IP: $BEST_IP"

      - name: Update Cloudflare DNS
        run: |
          EXIST_DATA=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$CF_RECORD_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json")
          
          RECORD_IDS=$(echo "$EXIST_DATA" | jq -r '.result[]?.id // empty')
          FIRST_ID=$(echo "$RECORD_IDS" | head -n1)

          if [[ ! -z "$FIRST_ID" && "$FIRST_ID" != "null" ]]; then
            echo "正在更新记录: $FIRST_ID"
            UPDATE_RES=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$FIRST_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          else
            echo "正在新增记录..."
            UPDATE_RES=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}")
          fi

          if echo "$UPDATE_RES" | jq -e '.success' > /dev/null; then
            echo "✅ DNS 更新成功: $BEST_IP"
            # 清理冗余记录
            for ID in $RECORD_IDS; do
              if [[ "$ID" != "$FIRST_ID" && "$ID" != "null" ]]; then
                curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$ID" \
                  -H "Authorization: Bearer $CF_API_TOKEN"
              fi
            done
          else
            echo "❌ 更新失败: $(echo $UPDATE_RES | jq -c '.errors')"
            exit 1
          fi
