name: Dual Node Healthy Check + Zero-Downtime Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl jq dnsutils

      - name: Define Environment
        run: |
          # 仅保留指定的两个节点
          NODES="emos.dirige.de5.net clun.top emby.67982.eu.cc" 
          echo "NODES=$NODES" >> $GITHUB_ENV
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> $GITHUB_ENV
          echo "CF_ZONE_ID=${{ secrets.CF_ZONE_ID }}" >> $GITHUB_ENV
          echo "CF_RECORD_NAME=${{ secrets.CF_RECORD_NAME }}" >> $GITHUB_ENV

      - name: Healthy Ping and Resolve
        run: |
          TOPIPS=()
          for NODE in $NODES; do
            # 拨测：检查 HTTP 状态码（200 或 302 视为健康）
            STATS=$(curl -o /dev/null -s -m 5 -w "%{http_code} %{time_total}" "https://$NODE" || echo "000 9.999")
            CODE=$(echo $STATS | awk '{print $1}')
            TIME=$(echo $STATS | awk '{print $2}')

            if [[ "$CODE" == "200" || "$CODE" == "302" ]]; then
              IP=$(dig +short "$NODE" | grep -E '^[0-9.]+$' | head -n1)
              if [[ ! -z "$IP" ]]; then
                # 记录格式：耗时 IP
                RESULTS+="$TIME $IP"$'\n'
                echo "节点 $NODE 健康 (Code: $CODE, Latency: ${TIME}s), IP: $IP"
              fi
            else
              echo "节点 $NODE 异常 (Code: $CODE)，跳过。"
            fi
          done

          # 按延迟排序并提取 IP（最多取 2 个）
          FINAL_IPS=$(echo "$RESULTS" | sort -n | awk '{print $2}' | uniq | head -2 | tr '\n' ' ')

          if [ -z "$FINAL_IPS" ]; then
            echo "错误：指定的两个节点均不可用，取消更新以保护解析。"
            exit 1
          fi

          echo "TOPIPS=$FINAL_IPS" >> $GITHUB_ENV
          echo "最终选定的健康 IP: $FINAL_IPS"

      - name: Zero-Downtime Update Cloudflare
        run: |
          # 1. 获取现有记录 ID
          OLD_IDS=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?type=A&name=$CF_RECORD_NAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" | jq -r '.result[].id')

          # 2. 先添加新 IP（零停机切换）
          for IP in $TOPIPS; do
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$CF_RECORD_NAME\",\"content\":\"$IP\",\"ttl\":1,\"proxied\":false}"
            echo "已成功指向新 IP: $IP"
          done

          # 3. 删除旧记录
          if [ ! -z "$OLD_IDS" ]; then
            for ID in $OLD_IDS; do
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$ID" \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json"
              echo "已清理旧记录 ID: $ID"
            done
          fi
          echo "更新完成。"
